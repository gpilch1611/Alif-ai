<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Alif AI - Islam &amp; arabski" />
  <meta property="og:description" content="Polska PWA do nauki alfabetu arabskiego, podstaw islamu, modlitwy i czytania Quranu." />
  <meta property="og:url" content="https://gpilch1611.github.io/Alif-ai/" />
  <meta property="og:image" content="https://gpilch1611.github.io/Alif-ai/assets/icon-512.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Alif AI - Islam &amp; arabski" />
  <meta name="twitter:description" content="Polska PWA do nauki arabskiego i treści islamskich." />
  <meta name="twitter:image" content="https://gpilch1611.github.io/Alif-ai/assets/icon-512.png" />
  <meta name="theme-color" content="#10B981" />
  <meta name="description" content="Alif AI pomaga spokojnie uczyć się alfabetu arabskiego, podstaw islamu, modlitwy i czytania Quranu." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alif AI" />
  <title>Alif AI - Islam &amp; arabski</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="assets/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.svg" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.tailwindcss.com" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css?v=20260603-culture-global" />
</head>
<body class="min-h-screen bg-[var(--bg)] text-[var(--text)]">
  <div id="appShell" class="min-h-screen pb-32">
    <header class="sticky top-0 z-40 border-b border-[var(--line)] bg-[var(--surface-soft)]/95 backdrop-blur">
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-3">
        <button id="homeLogo" class="flex min-h-12 items-center gap-3 rounded-lg px-1 text-left" aria-label="Alif AI — przejdź na stronę główną">
          <img src="assets/icon.svg" alt="" class="h-12 w-12 rounded-lg shadow-sm" />
          <span>
            <strong class="block text-lg leading-tight">Alif AI</strong>
            <span id="profileBadge" class="text-xs text-[var(--muted)]">ألف AI</span>
          </span>
        </button>
        <div class="flex items-center gap-2">
          <div id="searchContainer" class="hidden sm:flex items-center relative">
             <input id="globalSearch" type="search" class="h-10 w-40 md:w-64 rounded-lg border border-[var(--line)] bg-[var(--surface)] px-9 text-sm focus:w-72 transition-all" placeholder="Szukaj.[...]"/>
             <span class="absolute left-3 text-[var(--muted)]">🔍</span>
          </div>
          <button id="installBtn" class="hidden min-h-11 rounded-lg bg-emerald-500 px-4 font-semibold text-white shadow-sm">Zainstaluj</button>
          
          <!-- Settings Dropdown Menu -->
          <div class="header-menu-container relative">
            <button id="headerMenuBtn" class="grid h-11 min-w-11 place-items-center rounded-lg border border-[var(--line)] bg-[var(--surface)] text-lg" aria-label="Menu — język, motyw, ustawienia" aria-expanded="false" aria-controls="headerMenuDropdown">⚙️</button>
            <div id="headerMenuDropdown" class="header-menu-dropdown hidden absolute right-0 mt-2 w-56 border border-[var(--line)] rounded-lg bg-[var(--surface)] shadow-lg z-50">
              <div class="p-3 space-y-2">
                <!-- Language Section -->
                <div class="pb-3 border-b border-[var(--line)]">
                  <p id="menuLangLabel" class="text-xs font-black uppercase tracking-wide text-[var(--muted)] px-3 py-2">Język</p>
                  <div class="grid grid-cols-2 gap-2 px-2">
                    <button class="header-menu-option text-sm font-black py-2 px-3 rounded-lg border border-[var(--line)] bg-[var(--surface)] transition-all" data-lang="pl">🇵🇱 PL</button>
                    <button class="header-menu-option text-sm font-black py-2 px-3 rounded-lg border border-[var(--line)] bg-[var(--surface)] transition-all" data-lang="en">🇬🇧 EN</button>
                  </div>
                </div>
                
                <!-- Theme Section -->
                <div class="pb-3 border-b border-[var(--line)]">
                  <p id="menuThemeLabel" class="text-xs font-black uppercase tracking-wide text-[var(--muted)] px-3 py-2">Motyw</p>
                  <div class="grid grid-cols-2 gap-2 px-2">
                    <button class="header-menu-option theme-btn-light text-sm font-black py-2 px-3 rounded-lg border border-[var(--line)] bg-white text-[#1f2937] transition-all" data-theme="light">☀️ Light</button>
                    <button class="header-menu-option theme-btn-dark text-sm font-black py-2 px-3 rounded-lg border border-[var(--line)] bg-[#0e2533] text-[#f1fbff] transition-all" data-theme="dark">☾ Dark</button>
                  </div>
                </div>
                
                <!-- Settings Button -->
                <button id="openSettingsBtn" class="w-full text-left text-sm font-black py-2 px-3 rounded-lg border border-[var(--line)] bg-[var(--surface)] hover:bg-[var(--surface-soft)] transition-all">⚙️ Ustawienia</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-5">
      <section id="view" aria-live="polite"></section>
    </main>

    <div id="bottomSheet" class="bottom-sheet">
      <div class="bottom-sheet-handle"></div>
      <div id="bottomSheetContent" class="p-6"></div>
    </div>
    <div id="sheetOverlay" class="sheet-overlay"></div>

    <div id="focusOverlay" class="focus-overlay hidden">
      <button id="exitFocus" class="exit-focus">×</button>
      <div id="focusContent"></div>
    </div>

    <nav class="fixed inset-x-0 bottom-0 z-40 border-t border-[var(--line)] bg-[var(--surface-soft)]/96 backdrop-blur">
      <div id="bottomNav" class="mx-auto grid max-w-6xl grid-cols-6 gap-1 px-2 py-2"></div>
    </nav>
  </div>

  <dialog id="letterModal" class="modal-shell">
    <div class="modal-card">
      <button id="closeModal" class="absolute right-3 top-3 grid h-11 w-11 place-items-center rounded-lg border border-[var(--line)] bg-[var(--surface)] text-xl" aria-label="Zamknij">×</button>
      <div id="modalContent"></div>
    </div>
  </dialog>

  <canvas id="confettiCanvas" class="pointer-events-none fixed inset-0 z-50 hidden"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs" type="module"></script>
  <script type="module" src="app.js?v=20260603-culture-global"></script>
</body>
</html>
