<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10B981" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alif AI" />
  <title>Alif AI - Islam &amp; arabski</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.svg" />
  <link rel="apple-touch-icon" href="/assets/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" crossorigin src="/assets/index-Cvrdy15M.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-Cs3OV0-Y.css">
</head>
<body class="min-h-screen bg-[var(--bg)] text-[var(--text)]">
  <div id="appShell" class="min-h-screen pb-32">
    <header class="sticky top-0 z-40 border-b border-[var(--line)] bg-[var(--surface-soft)]/95 backdrop-blur">
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-3">
        <button id="homeLogo" data-testid="home-logo-btn" class="flex min-h-12 items-center gap-3 rounded-lg px-1 text-left" aria-label="Przejdź na stronę główną">
          <img src="/assets/icon.svg" alt="" class="h-12 w-12 rounded-lg shadow-sm" />
          <span>
            <strong class="block text-lg leading-tight">Alif AI</strong>
            <span id="profileBadge" class="text-xs text-[var(--muted)]">ألف AI</span>
          </span>
        </button>
        <div class="flex items-center gap-2">
          <div id="searchContainer" class="hidden sm:flex items-center relative">
             <input id="globalSearch" data-testid="global-search-input" type="search" class="h-10 w-40 md:w-64 rounded-lg border border-[var(--line)] bg-[var(--surface)] px-9 text-sm focus:w-72 transition-all" placeholder="Szukaj..." />
             <span class="absolute left-3 text-[var(--muted)]">🔍</span>
          </div>
          <button id="installBtn" data-testid="install-btn" class="hidden min-h-11 rounded-lg bg-emerald-500 px-4 font-semibold text-white shadow-sm">Zainstaluj</button>
          <button id="quickLangBtn" data-testid="lang-toggle-btn" class="grid h-11 min-w-11 place-items-center rounded-lg border border-[var(--line)] bg-[var(--surface)] px-3 text-sm font-black" aria-label="Zmień język">PL</button>
          <button id="themeBtn" data-testid="theme-toggle-btn" class="grid h-11 w-11 place-items-center rounded-lg border border-[var(--line)] bg-[var(--surface)] text-xl" aria-label="Zmień motyw">☾</button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-5">
      <section id="view" aria-live="polite"></section>
    </main>

    <div id="bottomSheet" class="bottom-sheet">
      <div class="bottom-sheet-handle"></div>
      <div id="bottomSheetContent" class="p-6"></div>
    </div>
    <div id="sheetOverlay" class="sheet-overlay"></div>

    <div id="focusOverlay" class="focus-overlay hidden">
      <button id="exitFocus" class="exit-focus" aria-label="Zamknij tryb skupienia">×</button>
      <div id="focusContent"></div>
    </div>

    <nav class="fixed inset-x-0 bottom-0 z-40 border-t border-[var(--line)] bg-[var(--surface-soft)]/96 backdrop-blur" aria-label="Główna nawigacja">
      <div id="bottomNav" class="mx-auto grid max-w-6xl grid-cols-6 gap-1 px-2 py-2 sm:grid-cols-12"></div>
    </nav>
  </div>

  <dialog id="letterModal" class="modal-shell" aria-modal="true">
    <div class="modal-card">
      <button id="closeModal" data-testid="close-modal-btn" class="absolute right-3 top-3 grid h-11 w-11 place-items-center rounded-lg border border-[var(--line)] bg-[var(--surface)] text-xl" aria-label="Zamknij okno">×</button>
      <div id="modalContent"></div>
    </div>
  </dialog>

  <canvas id="confettiCanvas" class="pointer-events-none fixed inset-0 z-50 hidden"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs" type="module"></script>
</body>
</html>
